<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fotogram</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body onload="renderPhoto()">
    <header>
      <img src="/assets/icons/Capa_1.png" alt="Fotogram logo" />
    </header>
    <main>
      <section>
        <h1>Your personal photo album</h1>
      </section>
      <section id="photo_gallery"></section>
    </main>
    <dialog id="photo_dialog">
      <div class="dialog_header">
        <h2 id="dialog_title"></h2>
        <button
          class="close_button"
          onclick="closeDialog()"
          aria-label="Close dialog"
        >
          <img src="/assets/icons/close.png" alt="Close">
        </button>
      </div>
      <img id="dialog_image" src="" alt="Expanded photo" />
      <div class="dialog_navigation">
        <button onclick="previousPhoto()"> <img src="/assets/icons/arrow_left.png" alt="Previous photo"></button>

        <span id="photo_counter"></span>

        <button onclick="nextPhoto()"> <img src="/assets/icons/arrow_right.png" alt="Next photo"></button>
      </div>
    </dialog>

    <footer>
      <div class="footer_brand">
        <img src="/assets/icons/DeveloperAkademieLogo.png" alt="Developer Akademie Logo">
        <img src="/assets/icons/DeveloperAkademieText.png" alt="Developer Akademie Text">
      </div>
      <div class="footer_copyright">
        <p>© 2023 Developer Akademie GmbH</p>
      </div>
    </footer>
  </body>
  <script src="/script.js"></script>
</html>
